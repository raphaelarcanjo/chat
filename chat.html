<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <title>My Chat</title>
</head>
<body>

    <!-- CONTENTE -->
    <form id="login" class="container text-center form-inline">
        <input type="text" name="caller" id="caller" placeholder="Your name" class="form-control" />
        <input type="hidden" name="receiver" id="receiver" value="Computer" />
        <button v-on:click="login" type="button" class="btn btn-primary">Start chat!</button>
    </form>

    <div id="app" class="">
        <ul>
            <li></li>
        </ul>
    </div>

    <!-- SCRIPTS -->

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <script src="js/script.js"></script>
</body>
</html>
